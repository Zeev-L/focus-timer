<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1024px; height:1024px; background:transparent; }
  .canvas { position:relative; width:1024px; height:1024px; }
  /* macOS-style rounded tile: 824x824 centred, ~100px margin, r≈185 */
  .tile {
    position:absolute; left:100px; top:100px; width:824px; height:824px;
    border-radius:185px; overflow:hidden;
    background:
      radial-gradient(circle at 50% 30%, rgba(79,209,181,0.18), rgba(79,209,181,0) 55%),
      linear-gradient(150deg, #17284a 0%, #0d1526 55%, #0a1120 100%);
    box-shadow: inset 0 3px 0 rgba(255,255,255,0.10), inset 0 -8px 40px rgba(0,0,0,0.35);
  }
  .ring { position:absolute; left:100px; top:100px; transform:rotate(-90deg); }
  .tip {
    position:absolute; width:46px; height:46px; border-radius:50%; background:#5fe6cd;
    box-shadow:0 0 46px 14px rgba(95,230,205,0.85);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="tile"></div>
  <svg class="ring" width="824" height="824" viewBox="0 0 824 824">
    <circle cx="412" cy="412" r="250" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="52"></circle>
    <circle cx="412" cy="412" r="250" fill="none" stroke="#4FD1B5" stroke-width="52" stroke-linecap="round"
      stroke-dasharray="1570.8" stroke-dashoffset="440"></circle>
  </svg>
  <!-- tip at leading edge of the 72% arc -->
  <div class="tip" style="left:264px; top:566px;"></div>
</div>
</body>
</html>
